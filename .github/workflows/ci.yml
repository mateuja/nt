name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Sync dev environment
        run: uv sync --project py

      - name: Run pre-commit (ruff, format, ty, hygiene, golangci-lint)
        run: uv run --project py/ pre-commit run --all-files --show-diff-on-failure

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.binary }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        binary: [py, go]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Sync dev environment
        run: uv sync --project py

      - name: Set up Go (go binary)
        if: matrix.binary == 'go'
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: true

      - name: Build Go binary
        if: matrix.binary == 'go'
        run: go -C go build -o bin/nt .

      - name: Run black-box CLI tests
        env:
          NT_BIN: ${{ matrix.binary == 'go' && './go/bin/nt' || '' }}
        run: uv run --project py/ pytest tests -q

  unit:
    name: Unit tests (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache: true

      - name: Go unit tests
        run: go -C go test ./...

      - name: Python unit tests
        if: hashFiles('py/tests/**.py') != ''
        run: uv run --project py/ pytest py/tests -q

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Build wheel + sdist
        run: uv build --project py --out-dir py/dist

      - name: Verify wheel contents
        run: |
          uv run --project py/ python - <<'PY'
          import glob, zipfile
          wheels = glob.glob("py/dist/*.whl")
          assert wheels, "no wheel produced"
          names = zipfile.ZipFile(wheels[0]).namelist()
          assert any(p.endswith("nt/__init__.py") for p in names), "missing nt/__init__.py"
          assert any(p.endswith("nt/__main__.py") for p in names), "missing nt/__main__.py"
          print(f"OK: {wheels[0]}")
          PY
