repos:
  # Local hooks run against the locked dev environment in py/. Versions stay in
  # sync with uv.lock, so local hooks and the CI `lint` job never drift apart.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --project py/ ruff check --fix --exit-non-zero-on-fix
        language: system
        types: [python]
        pass_filenames: true
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run --project py/ ruff format --check
        language: system
        types: [python]
        pass_filenames: true
        require_serial: true
      - id: ty-check
        name: ty check (py/ + tests/)
        entry: uv run --project py/ ty check --project py .
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true

  # Go linting. golangci-lint is the single source of truth: the same
  # config at go/.golangci.yml is consumed by both this hook and the CI
  # `lint` job, so they never drift apart. It runs from within go/
  # because there is no go.mod at the repo root (golangci-lint needs to
  # locate the main module). `language: golang` makes pre-commit
  # bootstrap golangci-lint itself, so Python-only contributors without
  # a local Go install are unaffected (the `files` filter excludes
  # them).
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint
        name: golangci-lint (go/)
        entry: bash -c 'cd go && golangci-lint run --config=.golangci.yml .'
        language: golang
        pass_filenames: false
        require_serial: true
        files: ^go/

  # Local Go format check (parallel to ruff format --check on the Python
  # side). golangci-lint reports gofmt problems but does not enforce a
  # zero-diff gate on its own; this hook fails the commit if any .go
  # file is not gofmt-clean.
  - repo: local
    hooks:
      - id: gofmt-check
        name: gofmt -l (go/)
        entry: bash -c 'out=$(gofmt -l go); if [ -n "$out" ]; then echo "$out"; exit 1; fi' --
        language: system
        files: ^go/.*\.go$
        pass_filenames: false
        require_serial: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
